<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Piano Anti-Cintas | Método de Piano Moderno | Giuliano Vega</title>
<style>
    :root {
        --bg: #0a0a0f;
        --bg-card: #13131f;
        --bg-light: #1c1c2b;
        --purple: #8B5CF6;
        --purple-dark: #6d28d9;
        --pink: #EC4899;
        --yellow: #facc15;
        --yellow-dark: #eab308;
        --text: #f8fafc;
        --text-muted: #94a3b8;
        --success: #22c55e;
        --white-key: #f8fafc;
        --white-key-active: #e2e8f0;
        --black-key: #1e293b;
        --black-key-active: #334155;
        --neon-glow: 0 0 10px rgba(139, 92, 246, 0.8), 0 0 20px rgba(236, 72, 153, 0.6), 0 0 40px rgba(139, 92, 246, 0.4);
        --neon-glow-strong: 0 0 15px rgba(139, 92, 246, 1), 0 0 30px rgba(236, 72, 153, 0.8), 0 0 60px rgba(139, 92, 246, 0.6);
        --shadow: 0 10px 25px -5px rgba(139, 92, 246, 0.3);
        --shadow-lg: 0 25px 50px -12px rgba(139, 92, 246, 0.4);
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        line-height: 1.6;
        overflow-x: hidden;
        background-image: 
            radial-gradient(circle at 20% 50%, rgba(139, 92, 246, 0.1) 0%, transparent 50%),
            radial-gradient(circle at 80% 20%, rgba(236, 72, 153, 0.1) 0%, transparent 50%);
    }

    .bg-glow {
        position: fixed;
        top: -30%;
        left: 50%;
        transform: translateX(-50%);
        width: 900px;
        height: 900px;
        background: radial-gradient(circle, rgba(139, 92, 246, 0.2) 0%, rgba(236, 72, 153, 0.1) 40%, transparent 70%);
        pointer-events: none;
        z-index: 0;
        animation: pulseGlow 4s ease-in-out infinite;
    }

    @keyframes pulseGlow {
        0%, 100% { opacity: 0.6; transform: translateX(-50%) scale(1); }
        50% { opacity: 1; transform: translateX(-50%) scale(1.05); }
    }
